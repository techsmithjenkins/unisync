<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broadcast | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#003366', accent: '#FFCC00' } } } }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 pb-20">
    <nav class="bg-gray-900 text-white p-4 flex gap-6 overflow-x-auto whitespace-nowrap sticky top-0 z-50 shadow-md">
        <a href="index.html" class="text-gray-400 hover:text-white transition">Dashboard</a>
        <a href="schedule.html" class="text-gray-400 hover:text-white transition">Timetable</a>
        <a href="broadcast.html" class="bg-primary px-3 py-1 rounded font-medium">Broadcast</a>
        <a href="resources.html" class="text-gray-400 hover:text-white transition">Resources</a>
        <a href="users.html" class="text-gray-400 hover:text-white transition">Students</a>
    </nav>

    <div class="max-w-4xl mx-auto p-4">
        <h3 class="text-xl font-bold mt-4 mb-2">Send Notification</h3>
        <p class="text-gray-500 text-sm mb-6">Send an instant alert to all students.</p>
        
        <form class="bg-white p-6 rounded-xl shadow-sm space-y-4">
            <div>
                <label class="block font-bold text-gray-700 mb-1">Title</label>
                <input type="text" placeholder="e.g. Class Cancelled" class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-primary focus:outline-none">
            </div>

            <div>
                <label class="block font-bold text-gray-700 mb-1">Message</label>
                <textarea rows="4" placeholder="Type your message here..." class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-primary focus:outline-none"></textarea>
            </div>

            <div>
                <label class="block font-bold text-gray-700 mb-1">Priority</label>
                <select class="w-full border border-gray-300 rounded-lg p-3 bg-white focus:ring-2 focus:ring-primary focus:outline-none">
                    <option value="info">🔵 General Info (Silent)</option>
                    <option value="critical">🔴 Critical Alert (Loud)</option>
                </select>
            </div>

            <button type="button" class="w-full bg-primary text-white font-bold py-3 rounded-lg hover:bg-opacity-90 transition shadow-md">
                Send Broadcast
            </button>
        </form>
    </div>
</body>
</html>
