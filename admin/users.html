<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#003366', success: '#5cb85c' } } } }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 pb-20">
    <nav class="bg-gray-900 text-white p-4 flex gap-6 overflow-x-auto whitespace-nowrap sticky top-0 z-50 shadow-md">
        <a href="index.html" class="text-gray-400 hover:text-white transition">Dashboard</a>
        <a href="schedule.html" class="text-gray-400 hover:text-white transition">Timetable</a>
        <a href="broadcast.html" class="text-gray-400 hover:text-white transition">Broadcast</a>
        <a href="resources.html" class="text-gray-400 hover:text-white transition">Resources</a>
        <a href="users.html" class="bg-primary px-3 py-1 rounded font-medium">Students</a>
    </nav>

    <div class="max-w-4xl mx-auto p-4">
        <h3 class="text-xl font-bold mt-4 mb-4">Student Management</h3>
        
        <div class="bg-white rounded-xl shadow-sm p-6 border-l-4 border-primary mb-8">
            <h4 class="font-bold text-lg mb-2">Bulk Import Students</h4>
            <p class="text-gray-500 text-sm mb-4">Upload a CSV file with a single column of Index Numbers.</p>
            
            <div class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center bg-gray-50 hover:bg-gray-100 hover:border-primary cursor-pointer transition">
                <span class="text-4xl">📄</span>
                <p class="mt-2 text-gray-500 text-sm">Drag and drop your CSV here.</p>
                <input type="file" accept=".csv" class="hidden">
            </div>
            <button class="mt-4 bg-primary text-white font-bold py-2 px-6 rounded-lg opacity-50 cursor-not-allowed">Process Import</button>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white p-6 rounded-xl shadow-sm text-center">
                <h2 class="text-4xl font-bold text-primary mb-1">142</h2>
                <small class="text-gray-500 uppercase tracking-wide">Total Students</small>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm text-center">
                <h2 class="text-4xl font-bold text-success mb-1">115</h2>
                <small class="text-gray-500 uppercase tracking-wide">Active Accounts</small>
            </div>
        </div>
    </div>
</body>
</html>
