<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resources | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#003366', accent: '#FFCC00', danger: '#d9534f' } } } }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 pb-20">
    <nav class="bg-gray-900 text-white p-4 flex gap-6 overflow-x-auto whitespace-nowrap sticky top-0 z-50 shadow-md">
        <a href="index.html" class="text-gray-400 hover:text-white transition">Dashboard</a>
        <a href="schedule.html" class="text-gray-400 hover:text-white transition">Timetable</a>
        <a href="broadcast.html" class="text-gray-400 hover:text-white transition">Broadcast</a>
        <a href="resources.html" class="bg-primary px-3 py-1 rounded font-medium">Resources</a>
        <a href="users.html" class="text-gray-400 hover:text-white transition">Students</a>
    </nav>

    <div class="max-w-4xl mx-auto p-4">
        <div class="flex justify-between items-center my-6">
            <h3 class="text-xl font-bold">Course Resources</h3>
            <button class="bg-primary text-white text-sm font-bold px-4 py-2 rounded-lg hover:bg-opacity-90">+ Upload New</button>
        </div>
        
        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
            <div class="bg-gray-50 px-4 py-2 border-b border-gray-200">
                <h4 class="text-primary font-bold text-sm">Recent Uploads</h4>
            </div>
            
            <div class="divide-y divide-gray-100">
                <div class="p-4 flex justify-between items-center hover:bg-gray-50">
                    <div>
                        <div class="font-bold text-gray-800">Lecture_Slide_1.pdf</div>
                        <small class="text-gray-500">MATH 101 • Dec 12, 2025</small>
                    </div>
                    <button class="bg-red-100 text-danger text-xs font-bold px-3 py-1 rounded hover:bg-danger hover:text-white transition">Delete</button>
                </div>

                <div class="p-4 flex justify-between items-center hover:bg-gray-50">
                    <div>
                        <div class="font-bold text-gray-800">Project_Guidelines.docx</div>
                        <small class="text-gray-500">ENCE 315 • Dec 10, 2025</small>
                    </div>
                    <button class="bg-red-100 text-danger text-xs font-bold px-3 py-1 rounded hover:bg-danger hover:text-white transition">Delete</button>
                </div>

                <div class="p-4 flex justify-between items-center hover:bg-gray-50">
                    <div>
                        <div class="font-bold text-gray-800">Course_Outline.pdf</div>
                        <small class="text-gray-500">COE 355 • Dec 8, 2025</small>
                    </div>
                    <button class="bg-red-100 text-danger text-xs font-bold px-3 py-1 rounded hover:bg-danger hover:text-white transition">Delete</button>
                </div>
            </div>
        </div>
    </div>
